name: Fetch RSS sources

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: rss-json-writes
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check script syntax
        run: |
          node --check scripts/clean-sources.mjs
          node --check scripts/fetch-rss.mjs

      - name: Read RSS feeds
        run: |
          node scripts/clean-sources.mjs
          node scripts/fetch-rss.mjs
          rm -f sources-extra*.json

      - name: Save JSON changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git status --short
          git add -A sources.json
          git add -A sources-extra*.json 2>/dev/null || true
          if [ -d data ]; then
            git add -A data
          fi
          if git diff --cached --quiet; then
            echo "No JSON changes to commit"
            exit 0
          fi
          git commit -m "Update RSS JSON data"
          git pull --rebase --autostash origin main
          git push origin HEAD:main
