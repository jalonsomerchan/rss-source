name: Fetch RSS sources

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

concurrency:
  group: fetch-rss-sources
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check script syntax
        run: node --check scripts/fetch-rss.mjs

      - name: Read RSS feeds
        run: node scripts/fetch-rss.mjs

      - name: Save JSON changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sources.json data
          if git diff --cached --quiet; then
            echo "No JSON changes to commit"
            exit 0
          fi
          git commit -m "Update RSS JSON data"
          git pull --rebase origin main
          git push origin HEAD:main
